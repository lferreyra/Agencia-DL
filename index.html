<!doctype html>
<html lang="en">
  <head>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch by assignment.
      // We move this to the absolute top of the head to catch any early library loads.
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            var originalFetch = window.fetch;
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(v) { currentFetch = v; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Could not polyfill fetch fix:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
